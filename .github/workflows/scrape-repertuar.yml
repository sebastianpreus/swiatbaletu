name: Odśwież repertuar

on:
  schedule:
    # Co godzinę od 6:00 do 23:00 czasu polskiego (UTC+1/+2)
    - cron: '7 5-22 * * *'
  workflow_dispatch: # Ręczne uruchomienie z GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: repo/package-lock.json

      - run: npm ci

      - name: Scrape repertuarów
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/scrape-repertuar.mjs --clean-future
